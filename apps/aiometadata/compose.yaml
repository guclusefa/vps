services:
  aiometadata:
    image: ghcr.io/cedya77/aiometadata:latest
    container_name: aiometadata
    restart: unless-stopped
    expose:
      - "3232"
    volumes:
      - ${DOCKER_DATA_DIR}/aiometadata:/app/addon/data
    environment:
      - TZ=${TZ:-UTC}
      - HOST_NAME=https://${AIOMETADATA_HOSTNAME}
      - DATABASE_URI=sqlite:///app/addon/data/db.sqlite
      - REDIS_URL=redis://:${GHOSTFOLIO_REDIS_PASSWORD}@ghostfolio-redis:6379/1
      - NODE_OPTIONS=--max-old-space-size=192
    depends_on:
      ghostfolio-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3232/api/cache/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    stop_grace_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M