services:
  filebrowser:
    image: filebrowser/filebrowser:v2-alpine
    container_name: filebrowser
    restart: unless-stopped
    command: -d /config/filebrowser.db -p 80

    volumes:
      - /opt:/srv
      - ${DOCKER_DATA_DIR}/filebrowser:/config
    environment:
      - TZ=${TZ:-UTC}

    stop_grace_period: 5s

