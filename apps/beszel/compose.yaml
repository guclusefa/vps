services:
  beszel:
    image: henrygd/beszel:latest
    container_name: beszel
    restart: unless-stopped
    volumes:
      - ${DOCKER_DATA_DIR}/beszel:/beszel_data
      - ${DOCKER_DATA_DIR}/beszel-socket:/beszel_socket
    environment:
      - TZ=${TZ:-UTC}
      - APP_URL=https://${BESZEL_HOSTNAME}
    healthcheck:
      test: ["CMD", "/beszel", "health", "--url", "http://localhost:8090"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s

  beszel-agent:
    image: henrygd/beszel-agent:latest
    container_name: beszel-agent
    restart: unless-stopped
    network_mode: host
    volumes:
      - ${DOCKER_DATA_DIR}/beszel-agent:/var/lib/beszel-agent
      - ${DOCKER_DATA_DIR}/beszel-socket:/beszel_socket
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TZ=${TZ:-UTC}
      - LISTEN=/beszel_socket/beszel.sock
      - KEY=${BESZEL_AGENT_KEY}
      - TOKEN=${BESZEL_AGENT_TOKEN}
    healthcheck:
      test: ["CMD", "/agent", "health"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s
