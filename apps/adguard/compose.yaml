services:
  adguard:
    image: adguard/adguardhome:latest
    container_name: adguard
    restart: always
    ports:
      - "127.0.0.1:53:53/udp"
      - "127.0.0.1:53:53/tcp"
      - "853:853/tcp"
    volumes:
      - ${DOCKER_DATA_DIR}/adguard/work:/opt/adguardhome/work
      - ${DOCKER_DATA_DIR}/adguard/config:/opt/adguardhome/conf
      - ${DOCKER_DATA_DIR}/caddy/data:/etc/caddy-certs:ro
    environment:
      - TZ=${TZ:-UTC}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
