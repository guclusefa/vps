services:
  adguard:
    image: adguard/adguardhome:latest
    container_name: adguard
    restart: unless-stopped
    ports:
      - "127.0.0.1:53:53/udp"
      - "127.0.0.1:53:53/tcp"
      - "853:853/tcp"
    expose:
      - "80"
      - "3000"
    volumes:
      - ${DOCKER_DATA_DIR}/adguard/work:/opt/adguardhome/work
      - ${DOCKER_DATA_DIR}/adguard/config:/opt/adguardhome/conf
      - ${DOCKER_DATA_DIR}/caddy/data:/etc/caddy-certs:ro
    environment:
      - TZ=${TZ:-UTC}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    stop_grace_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 192M
        reservations:
          memory: 64M