services:
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:latest
    container_name: wg-easy
    restart: always
    ports:
      - "51820:51820/udp"
    expose:
      - "51821"
    volumes:
      - ${DOCKER_DATA_DIR}/wg-easy:/etc/wireguard
    environment:
      - TZ=${TZ:-UTC}
      - WG_HOST=${DOMAIN}
      - PASSWORD_HASH=${WG_EASY_PASSWORD_HASH}
      - WG_DEFAULT_DNS=1.1.1.1
      - WG_ALLOWED_IPS=0.0.0.0/0
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:51821/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    stop_grace_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
