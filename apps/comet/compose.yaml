services:
  comet:
    image: g0ldyy/comet:latest
    container_name: comet
    restart: unless-stopped
    expose:
      - "2020"
    volumes:
      - ${DOCKER_DATA_DIR}/comet:/app/data
    environment:
      - TZ=${TZ:-UTC}
      - DATABASE_TYPE=sqlite
      - DATABASE_PATH=/app/data/comet.db
      - FASTAPI_PORT=2020
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:2020/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    stop_grace_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
