services:
  mediaflow-proxy:
    image: ghcr.io/mhdzumair/mediaflow-proxy-light:latest
    container_name: mediaflow-proxy
    restart: always
    expose:
      - "8888"
    volumes:
      - ./config.toml:/app/config.toml:ro
    environment:
      - TZ=${TZ:-UTC}
      - APP__AUTH__API_PASSWORD=${MEDIAFLOW_API_PASSWORD}
      - CONFIG_PATH=/app/config.toml
    depends_on:
      warp:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8888/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    stop_grace_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
