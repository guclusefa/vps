services:
  mediaflow-proxy:
    image: ghcr.io/mhdzumair/mediaflow-proxy-light:latest
    container_name: mediaflow-proxy
    restart: unless-stopped
    expose:
      - "8888"
    volumes:
      - ./config.toml:/app/config.toml:ro
    environment:
      - APP__AUTH__API_PASSWORD=${MEDIAFLOW_API_PASSWORD}
      - CONFIG_PATH=/app/config.toml
    depends_on:
      warp:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    stop_grace_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 96M
        reservations:
          memory: 32M