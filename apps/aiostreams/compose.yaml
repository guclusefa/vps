services:
  aiostreams:
    image: ghcr.io/viren070/aiostreams:latest
    container_name: aiostreams
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - ${DOCKER_DATA_DIR}/aiostreams:/app/data
    environment:
      - TZ=${TZ:-UTC}
      - BASE_URL=https://${AIOSTREAMS_HOSTNAME}
      - SECRET_KEY=${AIOSTREAMS_SECRET_KEY}
      - AIOSTREAMS_AUTH=${AIOSTREAMS_AUTH}
      - AIOSTREAMS_AUTH_ADMINS=${AIOSTREAMS_AUTH_ADMINS}
      - SEL_SYNC_ACCESS=all
      - REGEX_FILTER_ACCESS=all
      - NODE_OPTIONS=--max-old-space-size=384
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    stop_grace_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 448M
        reservations:
          memory: 64M