services:
  aiostreams:
    image: ghcr.io/viren070/aiostreams:latest
    container_name: aiostreams
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - ${DOCKER_DATA_DIR}/aiostreams:/app/data
    environment:
      - TZ=${TZ:-UTC}
      - BASE_URL=https://${AIOSTREAMS_HOSTNAME}
      - SECRET_KEY=${AIOSTREAMS_SECRET_KEY}
      - SEL_SYNC_ACCESS=all
      - REGEX_FILTER_ACCESS=all
      - ADDON_PROXY=${AIOSTREAMS_ADDON_PROXY:-}
      - ADDON_PROXY_CONFIG=${AIOSTREAMS_ADDON_PROXY_CONFIG:-}
    depends_on:
      warp:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    stop_grace_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 448M
        reservations:
          memory: 64M