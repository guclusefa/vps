[uwsgi]
; Wait for Redis before starting
exec-pre = python /app/scripts/wait_for_redis.py

; Attached daemons
; Redis is started with our custom config (memory cap, no persistence, loopback only)
attach-daemon = redis-server /etc/dispatcharr/redis.conf
attach-daemon = nice -n $(CELERY_NICE_LEVEL) celery -A dispatcharr worker -Q celery -n default@%%h --concurrency=1
attach-daemon = nice -n $(CELERY_NICE_LEVEL) celery -A dispatcharr worker -Q dvr -n dvr@%%h --pool=threads --concurrency=1
attach-daemon = nice -n $(CELERY_NICE_LEVEL) celery -A dispatcharr beat
attach-daemon = daphne -b 0.0.0.0 -p 8001 dispatcharr.asgi:application

; Core settings
chdir = /app
module = dispatcharr.wsgi:application
virtualenv = /dispatcharrpy
master = true
env = DJANGO_SETTINGS_MODULE=dispatcharr.settings
env = USE_NGINX_ACCEL=true
; Internal Unix socket — the container's built-in nginx proxies here and exposes port 9191
socket = /app/uwsgi.sock
chmod-socket = 777
vacuum = true
die-on-term = true
static-map = /static=/app/static

; Workers — 1 is sufficient for personal use; saves ~150M vs workers=2
workers = 1

; http = 0.0.0.0:9191   — NOT needed: internal nginx handles port 9191, not uWSGI directly
; http-keepalive = 1
; post-buffering = 0
; http-timeout = 600
socket-timeout = 600
buffer-size = 65536
lazy-apps = true

; Gevent — 50 greenlets per worker, ~150KB overhead, allows concurrent streams
gevent = 50
gevent-early-monkey-patch = true
import = dispatcharr.gevent_patch

; Performance
thunder-lock = true

; Logging
log-4xx = true
log-5xx = true
disable-logging = false
log-master = true
logformat-strftime = true
log-date = %%Y-%%m-%%d %%H:%%M:%%S,000
log-format = %(ftime) $(DISPATCHARR_LOG_LEVEL) uwsgi.requests Worker ID: %(wid) %(method) %(status) %(uri) %(msecs)ms
log-buffering = 1024