services:
  dispatcharr:
    image: ghcr.io/dispatcharr/dispatcharr:latest
    container_name: dispatcharr
    restart: always
    volumes:
      - ${DOCKER_DATA_DIR}/dispatcharr:/data
    environment:
      - TZ=${TZ:-UTC}
      - DISPATCHARR_ENV=aio
      - REDIS_HOST=127.0.0.1
      - CELERY_BROKER_URL=redis://127.0.0.1:6379/0
      - DISPATCHARR_LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:9191/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    stop_grace_period: 15s
