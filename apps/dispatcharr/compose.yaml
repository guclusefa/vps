services:
  dispatcharr:
    image: ghcr.io/dispatcharr/dispatcharr:latest
    container_name: dispatcharr
    restart: always
    expose:
      - "9191"
    volumes:
      - ${DOCKER_DATA_DIR}/dispatcharr:/data
    environment:
      - TZ=${TZ:-UTC}
      - DISPATCHARR_ENV=server
      - REDIS_HOST=dispatcharr-redis
      - CELERY_BROKER_URL=redis://dispatcharr-redis:6379/0
      - DISPATCHARR_LOG_LEVEL=info
    depends_on:
      dispatcharr-redis:
        condition: service_healthy
      dispatcharr-celery:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:9191/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    stop_grace_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  dispatcharr-celery:
    image: ghcr.io/dispatcharr/dispatcharr:latest
    container_name: dispatcharr-celery
    restart: always
    volumes:
      - ${DOCKER_DATA_DIR}/dispatcharr:/data
    environment:
      - TZ=${TZ:-UTC}
      - DISPATCHARR_ENV=celery
      - REDIS_HOST=dispatcharr-redis
      - CELERY_BROKER_URL=redis://dispatcharr-redis:6379/0
      - DISPATCHARR_LOG_LEVEL=info
    depends_on:
      dispatcharr-redis:
        condition: service_healthy
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  dispatcharr-redis:
    image: redis:alpine
    container_name: dispatcharr-redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    stop_grace_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
