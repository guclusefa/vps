services:
  dispatcharr:
    image: ghcr.io/dispatcharr/dispatcharr:latest
    container_name: dispatcharr
    restart: unless-stopped
    expose:
      - "9191"
    volumes:
      - ${DOCKER_DATA_DIR}/dispatcharr:/data
      # Mount our uwsgi.ini over the image's built-in config.
      # The AIO entrypoint reads /app/docker/uwsgi.ini at startup.
      - ./uwsgi.ini:/app/docker/uwsgi.ini:ro
      # Mount our redis.conf so Redis starts with a memory cap and no persistence.
      - ./redis.conf:/etc/dispatcharr/redis.conf:ro
    environment:
      - TZ=${TZ:-UTC}
      - DISPATCHARR_ENV=aio
      - REDIS_HOST=localhost
      - CELERY_BROKER_URL=redis://localhost:6379/0
      - DISPATCHARR_LOG_LEVEL=info
      # Celery/EPG tasks run at low priority (nice 5) to avoid starving uWSGI
      - CELERY_NICE_LEVEL=5
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:9191/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    stop_grace_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 256M