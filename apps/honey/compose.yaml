services:
  honey:
    image: ghcr.io/dani3l0/honey:latest
    container_name: honey
    restart: unless-stopped
    user: "${PUID}:${PGID}"
    expose:
      - "4173"
    volumes:
      - ./config.json:/app/dist/config/config.json:ro
      - ${DOCKER_DATA_DIR}/honey:/app/dist/img/custom
    environment:
      - TZ=${TZ:-UTC}
      - NODE_OPTIONS=--max-old-space-size=24
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4173"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    stop_grace_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 48M
        reservations:
          memory: 12M
