services:
  wallos:
    image: bellamy/wallos:latest
    container_name: wallos
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ${DOCKER_DATA_DIR}/wallos/db:/var/www/html/db
      - ${DOCKER_DATA_DIR}/wallos/logos:/var/www/html/images/uploads/logos
    environment:
      - TZ=${TZ:-UTC}
    stop_grace_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 16M
