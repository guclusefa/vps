services:
  wallos:
    image: bellamy/wallos:latest
    container_name: wallos
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ${DOCKER_DATA_DIR}/wallos/db:/var/www/html/db
      - ${DOCKER_DATA_DIR}/wallos/logos:/var/www/html/images/uploads/logos
    environment:
      - TZ=${TZ:-UTC}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    stop_grace_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
