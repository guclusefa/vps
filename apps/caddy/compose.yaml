services:
  caddy:
    image: caddy:latest
    container_name: caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${DOCKER_DATA_DIR}/caddy/data:/data
      - ${DOCKER_DATA_DIR}/caddy/config:/config
    environment:
      - ADGUARD_HOSTNAME=${ADGUARD_HOSTNAME}
      - ADGUARD_PORT=${ADGUARD_PORT:-80}
      - AIOMETADATA_HOSTNAME=${AIOMETADATA_HOSTNAME}
      - AIOSTREAMS_HOSTNAME=${AIOSTREAMS_HOSTNAME}
      - BESZEL_HOSTNAME=${BESZEL_HOSTNAME}
      - DISPATCHARR_HOSTNAME=${DISPATCHARR_HOSTNAME}
      - DOMAIN=${DOMAIN}
      - FILEBROWSER_HOSTNAME=${FILEBROWSER_HOSTNAME}
      - GHOSTFOLIO_HOSTNAME=${GHOSTFOLIO_HOSTNAME}
      - HONEY_HOSTNAME=${HONEY_HOSTNAME}
      - MEDIAFLOW_PROXY_HOSTNAME=${MEDIAFLOW_PROXY_HOSTNAME}
      - STIRLING_PDF_HOSTNAME=${STIRLING_PDF_HOSTNAME}
      - TZ=${TZ:-UTC}
      - UPTIME_KUMA_HOSTNAME=${UPTIME_KUMA_HOSTNAME}
      - WALLOS_HOSTNAME=${WALLOS_HOSTNAME}
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s
    stop_grace_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
